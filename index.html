<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BINGOゲーム</title>
<style>
body{font-family:sans-serif;text-align:center;background:linear-gradient(135deg,#f8fbff,#ffeef2,#eef5ff);margin:0;padding:20px}
h1{margin-bottom:10px}
#boards{display:flex;flex-wrap:wrap;justify-content:center;gap:20px;margin-top:20px}
.board-wrapper{position:relative}
.board{display:grid;grid-template-columns:repeat(5,60px);gap:8px;background:rgba(255,255,255,0.8);padding:15px;border-radius:15px}
.cell{width:60px;height:60px;display:flex;align-items:center;justify-content:center;background:#fff;border-radius:10px;font-weight:bold}
.marked{background:#ff7eb3;color:#fff}
.free{background:#ddd}
.bingo-text{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-size:28px;
  font-weight:bold;
  background:linear-gradient(90deg, red, orange, yellow, green, blue, indigo, violet);
  -webkit-background-clip:text;
  color:transparent;
  display:none;
}
button{padding:10px 20px;border:none;border-radius:15px;background:#7aa7ff;color:#fff;margin:5px;cursor:pointer}
#setup{margin-top:50px}
#game{display:none}
#drawn{font-size:22px;margin-top:10px}
#history{margin-top:10px}
</style>
</head>
<body>

<div id="setup">
<h1>人数を選んでね</h1>
<button onclick="startGame(1)">1人</button>
<button onclick="startGame(2)">2人</button>
<button onclick="startGame(3)">3人</button>
<button onclick="startGame(4)">4人</button>
</div>

<div id="game">
<h1>🎉 BINGO 🎉</h1>
<button onclick="drawNumber()">数字を引く</button>
<div id="drawn">引いた数字：-</div>
<div id="history">履歴：</div>
<div id="boards"></div>
</div>

<script>
let players=1;
let drawnNumbers=[];
let drawing=false;

function startGame(n){
  players=n;
  document.getElementById('setup').style.display='none';
  document.getElementById('game').style.display='block';
  createBoards();
}

function createBoards(){
  const container=document.getElementById('boards');
  container.innerHTML='';

  for(let p=0;p<players;p++){
    let wrapper=document.createElement('div');
    wrapper.className='board-wrapper';

    let board=document.createElement('div');
    board.className='board';

    for(let col=0;col<5;col++){
      let start=col*15+1;
      let nums=[];
      for(let i=0;i<15;i++) nums.push(start+i);
      nums.sort(()=>Math.random()-0.5);

      for(let row=0;row<5;row++){
        let cell=document.createElement('div');
        cell.className='cell';

        if(col===2 && row===2){
          cell.textContent='FREE';
          cell.classList.add('marked','free');
        }else{
          cell.textContent=nums[row];
        }

        board.appendChild(cell);
      }
    }

    let bingoText=document.createElement('div');
    bingoText.className='bingo-text';
    bingoText.textContent='BINGO!';

    wrapper.appendChild(board);
    wrapper.appendChild(bingoText);
    container.appendChild(wrapper);
  }
}

function drawNumber(){
  if(drawing || drawnNumbers.length>=75) return;

  drawing=true;
  let count=0;

  let interval=setInterval(()=>{
    let temp=Math.floor(Math.random()*75)+1;
    document.getElementById('drawn').textContent='引いてる… '+temp;
    count++;

    if(count>15){
      clearInterval(interval);

      let num;
      do{ num=Math.floor(Math.random()*75)+1;}while(drawnNumbers.includes(num));

      drawnNumbers.push(num);

      document.getElementById('drawn').textContent='引いた数字：'+num;
      document.getElementById('history').textContent='履歴：'+drawnNumbers.join(', ');

      markNumber(num);
      checkBingo();
      drawing=false;
    }
  },100);
}

function markNumber(num){
  document.querySelectorAll('.cell').forEach(cell=>{
    if(Number(cell.textContent)===num){
      cell.classList.add('marked');
    }
  });
}

function checkBingo(){
  document.querySelectorAll('.board-wrapper').forEach(wrapper=>{
    const cells=wrapper.querySelectorAll('.cell');
    let grid=[];

    for(let i=0;i<5;i++){
      grid[i]=[];
      for(let j=0;j<5;j++){
        grid[i][j]=cells[i*5+j].classList.contains('marked');
      }
    }

    let bingo=false;

    for(let i=0;i<5;i++) if(grid[i].every(v=>v)) bingo=true;
    for(let j=0;j<5;j++) if(grid.every(row=>row[j])) bingo=true;
    if([0,1,2,3,4].every(i=>grid[i][i])) bingo=true;
    if([0,1,2,3,4].every(i=>grid[i][4-i])) bingo=true;

    if(bingo){
      wrapper.querySelector('.bingo-text').style.display='block';
    }
  });
}
</script>

</body>
</html>
