<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>BINGO</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  color:#fff;
  text-align:center;
  font-family:sans-serif;
  background: radial-gradient(circle at 30% 30%, #2a2a2a, #000),
              radial-gradient(circle at 70% 70%, #3a3a3a, #000);
  background-blend-mode: screen;
}

h1{
  font-size:50px;
  font-family:'Orbitron', sans-serif;
  text-shadow:0 0 10px #fff,0 0 20px #0ff;
}

button{
  padding:10px 20px;
  margin:5px;
  border:none;
  border-radius:10px;
  background:#fff;
  color:#000;
  cursor:pointer;
}

/* カード配置 */
#boards{
  display:grid;
  grid-template-columns:repeat(2, auto);
  gap:20px;
  justify-content:center;
  margin-top:20px;
}

/* プレイヤー名 */
.player-name{
  margin-bottom:5px;
  font-weight:bold;
}

/* カード */
.board{
  display:grid;
  grid-template-columns:repeat(5,50px);
  gap:5px;
  background:#b3002d;
  padding:8px;
  border-radius:10px;
  box-shadow:0 0 15px rgba(255,0,0,0.3);
}

.cell{
  width:50px;
  height:50px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#111;
  border-radius:8px;
}

.header{
  font-size:20px;
  font-weight:bold;
}

.marked{
  background:#fff;
  color:#000;
}

/* 中央BINGO */
#centerBingo{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:60px;
  font-weight:bold;
  background:linear-gradient(90deg,red,orange,yellow,green,blue,purple);
  -webkit-background-clip:text;
  color:transparent;
  display:none;
  z-index:10;
}

/* シャボン玉 */
.bubble{
  position:fixed;
  bottom:0;
  width:20px;
  height:20px;
  border-radius:50%;
  background:rgba(255,255,255,0.3);
  animation:float 3s linear forwards;
}
@keyframes float{
  to{
    transform:translateY(-600px) scale(1.5);
    opacity:0;
  }
}
</style>
</head>

<body>

<h1>BINGO</h1>
<button onclick="drawNumber()">数字を引く</button>
<button onclick="resetGame()">リセット</button>

<div id="boards"></div>
<div id="centerBingo"></div>

<script>
let drawn=[];
let numbers=[];
let players=["プレイヤー1","プレイヤー2","プレイヤー3","プレイヤー4"];

/* 初期化 */
function init(){
  drawn=[];
  numbers=[...Array(75)].map((_,i)=>i+1);
  document.getElementById("boards").innerHTML="";
  createBoard();
}

/* カード生成 */
function createBoard(){
  const boards=document.getElementById("boards");

  players.forEach(name=>{
    let wrapper=document.createElement("div");

    let nameDiv=document.createElement("div");
    nameDiv.className="player-name";
    nameDiv.textContent=name;

    let board=document.createElement("div");
    board.className="board";

    let letters=["B","I","N","G","O"];
    letters.forEach(l=>{
      let c=document.createElement("div");
      c.className="cell header";
      c.textContent=l;
      board.appendChild(c);
    });

    for(let col=0;col<5;col++){
      let nums=[...Array(15)].map((_,i)=>col*15+i+1);
      nums.sort(()=>Math.random()-0.5);

      for(let row=0;row<5;row++){
        let c=document.createElement("div");
        c.className="cell";

        if(col===2 && row===2){
          c.textContent="FREE";
          c.classList.add("marked");
        }else{
          c.textContent=nums[row];
        }
        board.appendChild(c);
      }
    }

    wrapper.appendChild(nameDiv);
    wrapper.appendChild(board);
    boards.appendChild(wrapper);
  });
}

/* 数字 */
function drawNumber(){
  if(numbers.length===0)return;

  let index=Math.floor(Math.random()*numbers.length);
  let num=numbers.splice(index,1)[0];
  drawn.push(num);

  mark(num);
  checkBingo();
}

/* マーク */
function mark(num){
  document.querySelectorAll(".cell").forEach(c=>{
    if(Number(c.textContent)===num){
      c.classList.add("marked");
    }
  });
}

/* ビンゴ判定 */
function checkBingo(){
  let wrappers=document.querySelectorAll("#boards > div");

  wrappers.forEach(w=>{
    let name=w.querySelector(".player-name").textContent;
    let cells=w.querySelectorAll(".cell:not(.header)");
    let g=[...Array(5)].map(()=>Array(5));

    for(let i=0;i<5;i++){
      for(let j=0;j<5;j++){
        g[i][j]=cells[i*5+j].classList.contains("marked");
      }
    }

    let bingo=false;

    for(let i=0;i<5;i++){
      if(g[i].every(v=>v)) bingo=true;
      if(g.every(r=>r[i])) bingo=true;
    }

    if([0,1,2,3,4].every(i=>g[i][i])) bingo=true;
    if([0,1,2,3,4].every(i=>g[i][4-i])) bingo=true;

    if(bingo){
      showBingo(name);
    }
  });
}

/* 演出 */
function showBingo(name){
  let center=document.getElementById("centerBingo");
  center.textContent=name + " さん BINGO!";
  center.style.display="block";

  for(let i=0;i<20;i++){
    let b=document.createElement("div");
    b.className="bubble";
    b.style.left=Math.random()*100+"%";
    document.body.appendChild(b);
    setTimeout(()=>b.remove(),3000);
  }

  setTimeout(()=>{
    center.style.display="none";
  },3000);
}

/* リセット */
function resetGame(){
  document.getElementById("centerBingo").style.display="none";
  init();
}

/* 初回起動 */
init();
</script>

</body>
</html>
