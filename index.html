<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>BINGO</title>
<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  text-align:center;
  font-family:sans-serif;
}

/* タイトル */
h1{
  font-size:50px;
  letter-spacing:6px;
  font-family:'Impact','Arial Black',sans-serif;
}

/* 画面 */
#setup,#nameInput,#game{
  margin-top:30px;
}
#nameInput,#game{display:none}

/* ボタン */
button{
  padding:10px 20px;
  margin:5px;
  border:none;
  border-radius:10px;
  background:#fff;
  color:#000;
  cursor:pointer;
}

/* カード配置 */
#boards{
  display:grid;
  gap:15px;
  justify-content:center;
}

#boards.one{grid-template-columns:1fr}
#boards.two{grid-template-columns:repeat(2,1fr)}
#boards.three{grid-template-columns:repeat(3,1fr)}
#boards.four{grid-template-columns:repeat(2,1fr)}

/* カード */
.board-wrapper{position:relative}

.player-name{
  margin-bottom:5px;
  font-weight:bold;
}

.board{
  display:grid;
  grid-template-columns:repeat(5,60px);
  gap:6px;
  background:#b3002d;
  padding:10px;
  border-radius:10px;
}

.cell{
  width:60px;
  height:60px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#111;
  border-radius:8px;
  font-weight:bold;
}

.header{
  background:#b3002d;
}

.marked{
  background:#fff;
  color:#000;
}

.free{
  background:#444;
}

/* 4人のとき小さく */
#boards.four .board{
  grid-template-columns:repeat(5,45px);
}
#boards.four .cell{
  width:45px;
  height:45px;
  font-size:12px;
}

/* BINGO表示 */
.bingo-text{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:40px;
  font-weight:bold;
  background:linear-gradient(90deg,red,orange,yellow,green,blue,purple);
  -webkit-background-clip:text;
  color:transparent;
  display:none;
}
</style>
</head>

<body>

<!-- 人数選択 -->
<div id="setup">
<h1>BINGO</h1>
<button onclick="selectPlayers(1)">1人</button>
<button onclick="selectPlayers(2)">2人</button>
<button onclick="selectPlayers(3)">3人</button>
<button onclick="selectPlayers(4)">4人</button>
</div>

<!-- 名前入力 -->
<div id="nameInput">
<h1>名前入力</h1>
<div id="inputs"></div>
<button onclick="startGame()">スタート</button>
</div>

<!-- ゲーム -->
<div id="game">
<h1>BINGO</h1>
<button onclick="drawNumber()">数字を引く</button>
<div id="drawn">-</div>
<div id="history"></div>
<div id="boards"></div>
</div>

<script>
let players=1;
let names=[];
let drawn=[];
let drawing=false;

function selectPlayers(n){
  players=n;
  setup.style.display="none";
  nameInput.style.display="block";

  inputs.innerHTML="";
  for(let i=0;i<n;i++){
    let input=document.createElement("input");
    input.placeholder="プレイヤー"+(i+1);
    input.id="name"+i;
    inputs.appendChild(input);
  }
}

function startGame(){
  names=[];
  for(let i=0;i<players;i++){
    let val=document.getElementById("name"+i).value;
    names.push(val||"Player"+(i+1));
  }

  nameInput.style.display="none";
  game.style.display="block";

  createBoards();
}

function createBoards(){
  boards.innerHTML="";
  boards.className="";
  boards.classList.add(["one","two","three","four"][players-1]);

  const letters=["B","I","N","G","O"];

  for(let p=0;p<players;p++){
    let wrap=document.createElement("div");
    wrap.className="board-wrapper";

    let name=document.createElement("div");
    name.className="player-name";
    name.textContent=names[p];

    let board=document.createElement("div");
    board.className="board";

    // ヘッダー
    letters.forEach(l=>{
      let c=document.createElement("div");
      c.className="cell header";
      c.textContent=l;
      board.appendChild(c);
    });

    // 数字
    for(let col=0;col<5;col++){
      let nums=[...Array(15)].map((_,i)=>col*15+i+1);
      nums.sort(()=>Math.random()-0.5);

      for(let row=0;row<5;row++){
        let c=document.createElement("div");
        c.className="cell";

        if(col===2 && row===2){
          c.textContent="FREE";
          c.classList.add("marked","free");
        }else{
          c.textContent=nums[row];
        }
        board.appendChild(c);
      }
    }

    let bingo=document.createElement("div");
    bingo.className="bingo-text";
    bingo.textContent="BINGO!";

    wrap.appendChild(name);
    wrap.appendChild(board);
    wrap.appendChild(bingo);
    boards.appendChild(wrap);
  }
}

function drawNumber(){
  if(drawing) return;
  drawing=true;

  let count=0;
  let interval=setInterval(()=>{
    drawnText=Math.floor(Math.random()*75)+1;
    drawnDisplay.textContent="引いてる… "+drawnText;
    count++;

    if(count>15){
      clearInterval(interval);

      let num;
      do{
        num=Math.floor(Math.random()*75)+1;
      }while(drawn.includes(num));

      drawn.push(num);

      drawnDisplay.textContent="引いた："+num;
      history.textContent="履歴："+drawn.join(", ");

      mark(num);
      checkBingo();
      drawing=false;
    }
  },100);
}

function mark(num){
  document.querySelectorAll(".cell").forEach(c=>{
    if(Number(c.textContent)===num){
      c.classList.add("marked");
    }
  });
}

function checkBingo(){
  document.querySelectorAll(".board-wrapper").forEach(w=>{
    let cells=w.querySelectorAll(".cell:not(.header)");
    let g=[...Array(5)].map(()=>Array(5).fill(false));

    for(let i=0;i<5;i++){
      for(let j=0;j<5;j++){
        g[i][j]=cells[i*5+j].classList.contains("marked");
      }
    }

    let b=false;
    for(let i=0;i<5;i++){
      if(g[i].every(v=>v)) b=true;
      if(g.every(r=>r[i])) b=true;
    }
    if([0,1,2,3,4].every(i=>g[i][i])) b=true;
    if([0,1,2,3,4].every(i=>g[i][4-i])) b=true;

    if(b){
      w.querySelector(".bingo-text").style.display="block";
    }
  });
}
</script>

</body>
</html>
