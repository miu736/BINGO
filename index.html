<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BINGOゲーム</title>
<style>
body{font-family:sans-serif;text-align:center;background:#000;color:#fff;margin:0;padding:20px}
h1{margin-bottom:10px}
#boards{display:grid;justify-items:center;gap:20px;margin-top:20px}

/* 人数ごとの配置 */
#boards.one{grid-template-columns:1fr}
#boards.two{grid-template-columns:repeat(2,1fr)}
#boards.three{grid-template-columns:repeat(3,1fr)}
#boards.four{grid-template-columns:repeat(2,1fr)}
.board-wrapper{position:relative}
.player-name{margin-bottom:5px;font-weight:bold}
.board{display:grid;grid-template-columns:repeat(5,60px);gap:8px;background:#b3002d;padding:15px;border-radius:15px}
.cell{width:60px;height:60px;display:flex;align-items:center;justify-content:center;background:#111;border-radius:10px;font-weight:bold}
.header{background:#b3002d;color:#fff;font-size:18px}
.marked{background:#fff;color:#000}
.free{background:#444}
.bingo-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:30px;font-weight:bold;background:linear-gradient(90deg, red, orange, yellow, green, blue, indigo, violet);-webkit-background-clip:text;color:transparent;display:none}
button{padding:10px 20px;border:none;border-radius:15px;background:#fff;color:#000;margin:5px;cursor:pointer}
#setup,#nameInput{margin-top:50px}
#game,#nameInput{display:none}
#drawn{font-size:22px;margin-top:10px}
#history{margin-top:10px}
input{padding:8px;border-radius:10px;border:none;margin:5px}
</style>
</head>
<body>

<div id="setup">
<h1>人数を選んでね</h1>
<button onclick="selectPlayers(1)">1人</button>
<button onclick="selectPlayers(2)">2人</button>
<button onclick="selectPlayers(3)">3人</button>
<button onclick="selectPlayers(4)">4人</button>
</div>

<div id="nameInput">
<h1>名前を入力してね</h1>
<div id="inputs"></div>
<button onclick="startGame()">スタート</button>
</div>

<div id="game">
<h1>🎉 BINGO 🎉</h1>
<button onclick="drawNumber()">数字を引く</button>
<div id="drawn">引いた数字：-</div>
<div id="history">履歴：</div>
<div id="boards"></div>
</div>

<script>
let players=1;
let names=[];
let drawnNumbers=[];
let drawing=false;

function selectPlayers(n){
  players=n;
  document.getElementById('setup').style.display='none';
  document.getElementById('nameInput').style.display='block';

  const inputsDiv=document.getElementById('inputs');
  inputsDiv.innerHTML='';

  for(let i=0;i<players;i++){
    let input=document.createElement('input');
    input.placeholder='プレイヤー'+(i+1);
    input.id='name'+i;
    inputsDiv.appendChild(input);
  }
}

function startGame(){
  names=[];
  for(let i=0;i<players;i++){
    let val=document.getElementById('name'+i).value;
    names.push(val || 'Player'+(i+1));
  }

  document.getElementById('nameInput').style.display='none';
  document.getElementById('game').style.display='block';
  createBoards();
}

function createBoards(){
  const container=document.getElementById('boards');
  container.className='';
  if(players===1) container.classList.add('one');
  if(players===2) container.classList.add('two');
  if(players===3) container.classList.add('three');
  if(players===4) container.classList.add('four');
  const container=document.getElementById('boards');
  container.innerHTML='';

  const letters=['B','I','N','G','O'];

  for(let p=0;p<players;p++){
    let wrapper=document.createElement('div');
    wrapper.className='board-wrapper';

    let nameDiv=document.createElement('div');
    nameDiv.className='player-name';
    nameDiv.textContent=names[p];

    let board=document.createElement('div');
    board.className='board';

    for(let i=0;i<5;i++){
      let cell=document.createElement('div');
      cell.className='cell header';
      cell.textContent=letters[i];
      board.appendChild(cell);
    }

    for(let col=0;col<5;col++){
      let start=col*15+1;
      let nums=[];
      for(let i=0;i<15;i++) nums.push(start+i);
      nums.sort(()=>Math.random()-0.5);

      for(let row=0;row<5;row++){
        let cell=document.createElement('div');
        cell.className='cell';

        if(col===2 && row===2){
          cell.textContent='FREE';
          cell.classList.add('marked','free');
        }else{
          cell.textContent=nums[row];
        }

        board.appendChild(cell);
      }
    }

    let bingoText=document.createElement('div');
    bingoText.className='bingo-text';
    bingoText.textContent='BINGO!';

    wrapper.appendChild(nameDiv);
    wrapper.appendChild(board);
    wrapper.appendChild(bingoText);
    container.appendChild(wrapper);
  }
}

function drawNumber(){
  if(drawing || drawnNumbers.length>=75) return;

  drawing=true;
  let count=0;

  let interval=setInterval(()=>{
    let temp=Math.floor(Math.random()*75)+1;
    document.getElementById('drawn').textContent='引いてる… '+temp;
    count++;

    if(count>15){
      clearInterval(interval);

      let num;
      do{ num=Math.floor(Math.random()*75)+1;}while(drawnNumbers.includes(num));

      drawnNumbers.push(num);

      document.getElementById('drawn').textContent='引いた数字：'+num;
      document.getElementById('history').textContent='履歴：'+drawnNumbers.join(', ');

      markNumber(num);
      checkBingo();
      drawing=false;
    }
  },100);
}

function markNumber(num){
  document.querySelectorAll('.cell').forEach(cell=>{
    if(Number(cell.textContent)===num){
      cell.classList.add('marked');
    }
  });
}

function checkBingo(){
  document.querySelectorAll('.board-wrapper').forEach(wrapper=>{
    const cells=wrapper.querySelectorAll('.cell:not(.header)');
    let grid=[];

    for(let i=0;i<5;i++){
      grid[i]=[];
      for(let j=0;j<5;j++){
        grid[i][j]=cells[i*5+j].classList.contains('marked');
      }
    }

    let bingo=false;

    for(let i=0;i<5;i++) if(grid[i].every(v=>v)) bingo=true;
    for(let j=0;j<5;j++) if(grid.every(row=>row[j])) bingo=true;
    if([0,1,2,3,4].every(i=>grid[i][i])) bingo=true;
    if([0,1,2,3,4].every(i=>grid[i][4-i])) bingo=true;

    if(bingo){
      wrapper.querySelector('.bingo-text').style.display='block';
    }
  });
}
</script>

</body>
</html>
